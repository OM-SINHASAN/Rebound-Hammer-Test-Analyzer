<!DOCTYPE html>
<html>
<head>
  <title>Rebound Hammer Test Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Rebound Hammer Test Analyzer</h1>

    <input type="text" id="values" placeholder="25,26,27,28,29">

  <!-- Chart.js FIRST -->

  <!-- Your JS LAST -->
  <script src="./script.js"></script>

</body>
</html>
